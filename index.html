<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5-Day Fitness Plan</title>
  <style>
    :root {
      --bg: #fbf7f2;
      --card: #ffffff;
      --text: #211f1f;
      --muted: #766f68;
      --line: #eadfd5;
      --accent: #bf6b4a;
      --accent-soft: #f5ded2;
      --accent-2: #6f8f72;
      --done: #e9f4e8;
      --shadow: 0 10px 28px rgba(58, 43, 33, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(191, 107, 74, 0.16), transparent 32rem),
        linear-gradient(180deg, #fffaf6 0%, var(--bg) 42%, #f9f2eb 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    a { color: inherit; text-decoration: none; }

    .app {
      width: min(100%, 840px);
      margin: 0 auto;
      padding: 18px 14px 90px;
    }

    .hero {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(234, 223, 213, 0.85);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(10px);
      margin-bottom: 14px;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    h1 {
      font-size: clamp(1.75rem, 7vw, 3rem);
      line-height: 1.03;
      margin: 0 0 10px;
      letter-spacing: -0.055em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .mini-stat {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 10px;
      background: #fffaf7;
    }

    .mini-stat strong {
      display: block;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
    }

    .mini-stat span {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: 0 -14px 14px;
      padding: 10px 14px;
      background: rgba(251, 247, 242, 0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(234, 223, 213, 0.75);
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.8);
      color: var(--muted);
      border-radius: 999px;
      padding: 10px 13px;
      font-weight: 750;
      font-size: 0.86rem;
      cursor: pointer;
    }

    .tab.active {
      color: #fff;
      background: var(--text);
      border-color: var(--text);
    }

    .screen { display: none; }
    .screen.active { display: block; animation: rise 160ms ease-out; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(234, 223, 213, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 12px;
    }

    .section-title {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h2 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: -0.035em;
    }

    .focus {
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 3px;
    }

    .pill {
      align-self: flex-start;
      background: var(--accent-soft);
      color: #8d442c;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .quick {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .quick div {
      background: #fff9f4;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
    }

    .quick strong {
      display: block;
      font-size: 0.92rem;
    }

    .quick span {
      color: var(--muted);
      font-size: 0.75rem;
    }

    details {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fffdfb;
      margin-top: 9px;
      overflow: hidden;
    }

    summary {
      cursor: pointer;
      padding: 13px 14px;
      font-weight: 850;
      list-style: none;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    summary::-webkit-details-marker { display: none; }

    summary::after {
      content: "＋";
      color: var(--accent);
      font-weight: 900;
    }

    details[open] summary::after { content: "−"; }

    .items {
      padding: 0 12px 12px;
      display: grid;
      gap: 8px;
    }

    .item {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 9px;
      align-items: center;
      padding: 10px;
      border: 1px solid #efe6df;
      border-radius: 15px;
      background: #fff;
    }

    .check {
      width: 24px;
      height: 24px;
      accent-color: var(--accent-2);
    }

    .item label {
      font-weight: 760;
      letter-spacing: -0.01em;
    }

    .item small {
      display: block;
      color: var(--muted);
      font-weight: 500;
      margin-top: 1px;
    }

    .watch {
      color: var(--accent);
      font-weight: 900;
      font-size: 0.88rem;
      padding: 6px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
    }

    .completed .item-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .completed {
      background: var(--done);
      border-color: #d8ead6;
    }

    .done-btn {
      width: 100%;
      border: 0;
      border-radius: 18px;
      background: var(--text);
      color: #fff;
      padding: 14px;
      font-weight: 900;
      cursor: pointer;
      font-size: 0.98rem;
      margin-top: 8px;
    }

    .done-btn.done {
      background: var(--accent-2);
    }

    .tracker {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .track-day {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fffaf7;
      padding: 10px 6px;
      text-align: center;
      cursor: pointer;
    }

    .track-day strong {
      display: block;
      font-size: 0.86rem;
    }

    .track-day span {
      color: var(--muted);
      font-size: 0.73rem;
    }

    .track-day.done {
      background: var(--done);
      border-color: #cfe5cd;
    }

    .note {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 8px 0 0;
    }

    .meal-grid {
      display: grid;
      gap: 8px;
    }

    .meal {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: #fffdfb;
    }

    .meal strong { display: block; margin-bottom: 3px; }
    .meal span { color: var(--muted); }

    .two-col {
      display: grid;
      gap: 8px;
    }

    .reset {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 9px 12px;
      font-weight: 800;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--line);
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    }

    .bottom-nav-inner {
      width: min(100%, 840px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .nav-btn {
      border: 0;
      border-radius: 16px;
      padding: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .nav-btn.primary { background: var(--accent); color: #fff; }
    .nav-btn.secondary { background: #f2e7de; color: var(--text); }

    @media (min-width: 720px) {
      .app { padding-top: 26px; }
      .two-col { grid-template-columns: 1fr 1fr; }
      .hero { padding: 24px; }
      .card { padding: 18px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="eyebrow">Beginner friendly</div>
      <h1>5-Day Lean Fitness Plan</h1>
      <p class="subtitle">One hour a day. Strength, cardio, nutrition, and slow progression without overcomplicating it.</p>
      <div class="hero-grid">
        <div class="mini-stat"><strong>5 days</strong><span>weekly routine</span></div>
        <div class="mini-stat"><strong>60 min</strong><span>per session</span></div>
        <div class="mini-stat"><strong>Easy</strong><span>progression</span></div>
      </div>
    </section>

    <section class="card">
      <div class="section-title">
        <div>
          <h2>This week</h2>
          <div class="focus" id="progressText">0 of 5 workouts complete</div>
        </div>
        <span class="pill" id="streakPill">Start light</span>
      </div>
      <div class="tracker" id="tracker"></div>
      <button class="reset" onclick="resetWeek()">Reset week</button>
    </section>

    <div class="tabs-wrap">
      <nav class="tabs" id="tabs"></nav>
    </div>

    <section id="screen"></section>
  </main>

  <div class="bottom-nav">
    <div class="bottom-nav-inner">
      <button class="nav-btn secondary" onclick="goPrev()">Previous</button>
      <button class="nav-btn primary" onclick="goNext()">Next</button>
    </div>
  </div>

<script>
const plan = [
  {
    id: "day1", label: "Day 1", title: "Lower Body", focus: "Glutes + Quads",
    time: ["5–8 min", "40–45 min", "10–12 min"],
    groups: [
      { title: "Warm-up", open: true, items: [
        ["Bodyweight squats", "easy pace", "https://musclewiki.com/exercises/quads/bodyweight?model=f"],
        ["Lunges", "bodyweight", "https://musclewiki.com/exercises/quads/bodyweight?model=f"],
        ["Hip circles", "slow + controlled", ""]
      ]},
      { title: "Workout", open: true, items: [
        ["Squats", "3×10–12", "https://musclewiki.com/exercise/barbell-squat?model=f"],
        ["Walking lunges", "3×12 each leg", "https://musclewiki.com/exercise/lunge-walking?model=f"],
        ["Leg press", "3×12", "https://musclewiki.com/exercise/machine-leg-press?model=f"],
        ["Glute bridge / Hip thrust", "3×12–15", "https://musclewiki.com/exercise/barbell-hip-thrust?model=f"],
        ["Leg extensions", "3×12", "https://musclewiki.com/exercise/machine-leg-extension?model=f"]
      ]},
      { title: "Finisher", open: false, items: [
        ["Incline walking", "10–12 min", ""]
      ]}
    ]
  },
  {
    id: "day2", label: "Day 2", title: "Upper Body + Core", focus: "Back, shoulders, arms",
    time: ["5–8 min", "40–45 min", "10–15 min"],
    groups: [
      { title: "Workout", open: true, items: [
        ["Lat pulldown", "3×10–12", "https://musclewiki.com/exercise/machine-pulldown?model=f"],
        ["Dumbbell shoulder press", "3×10", "https://musclewiki.com/exercise/dumbbell-seated-overhead-press?model=f"],
        ["Push-ups / Assisted push-ups", "3×8–12", "https://musclewiki.com/exercise/incline-push-up?model=f"],
        ["Seated row", "3×12", "https://musclewiki.com/exercise/machine-seated-cable-row?model=f"],
        ["Dumbbell curls", "3×12", "https://musclewiki.com/exercise/dumbbell-curl?model=f"],
        ["Tricep pushdown", "3×12", "https://musclewiki.com/exercise/cable-rope-pushdown?model=f"]
      ]},
      { title: "Core", open: true, items: [
        ["Plank", "3×30–45 sec", "https://musclewiki.com/exercise/forearm-plank?model=f"],
        ["Hanging / knee raises", "3×12", "https://musclewiki.com/exercise/hanging-knee-raises?model=f"]
      ]},
      { title: "Cardio", open: false, items: [
        ["Light jog / cycling", "10–15 min", ""]
      ]}
    ]
  },
  {
    id: "day3", label: "Day 3", title: "Cardio + Core", focus: "Fat-loss support",
    time: ["5 min", "30–40 min", "10–15 min"],
    groups: [
      { title: "Cardio", open: true, items: [
        ["Brisk walk / cycling / elliptical", "30–40 min", ""]
      ]},
      { title: "Core circuit", open: true, items: [
        ["Russian twists", "15 each side", "https://musclewiki.com/exercise/bodyweight-russian-twist?model=f"],
        ["Leg raises", "12–15", "https://musclewiki.com/exercise/laying-leg-raises?model=f"],
        ["Mountain climbers", "30 sec", "https://musclewiki.com/exercise/mountain-climber?model=f"],
        ["Plank", "30 sec", "https://musclewiki.com/exercise/forearm-plank?model=f"]
      ]}
    ]
  },
  {
    id: "day4", label: "Day 4", title: "Lower Body", focus: "Hamstrings + Glutes",
    time: ["5–8 min", "40–45 min", "10–12 min"],
    groups: [
      { title: "Workout", open: true, items: [
        ["Romanian deadlifts", "3×10–12", "https://musclewiki.com/exercise/barbell-romanian-deadlift?model=f"],
        ["Step-ups", "3×10 each leg", "https://musclewiki.com/exercise/dumbbell-step-up?model=f"],
        ["Hamstring curls", "3×12", "https://musclewiki.com/exercise/machine-hamstring-curl?model=f"],
        ["Bulgarian split squats", "3×10 each leg", "https://musclewiki.com/exercise/dumbbell-bulgarian-split-squat?model=f"],
        ["Cable kickbacks", "3×12", "https://musclewiki.com/exercise/cable-standing-straight-leg-glute-glute-kickback?model=f"]
      ]},
      { title: "Finisher", open: false, items: [
        ["Stair climbing / incline walk", "10–12 min", ""]
      ]}
    ]
  },
  {
    id: "day5", label: "Day 5", title: "Full Body", focus: "Conditioning",
    time: ["5–8 min", "35–40 min", "10 min"],
    groups: [
      { title: "Circuit: 3–4 rounds", open: true, items: [
        ["Squats", "12 reps", "https://musclewiki.com/exercise/barbell-squat?model=f"],
        ["Push-ups", "10 reps", "https://musclewiki.com/exercise/incline-push-up?model=f"],
        ["Rows", "12 reps", "https://musclewiki.com/exercise/dumbbell-row-bilateral?model=f"],
        ["Lunges", "10 each leg", "https://musclewiki.com/exercises/quads/bodyweight?model=f"],
        ["Shoulder press", "10 reps", "https://musclewiki.com/exercise/dumbbell-seated-overhead-press?model=f"]
      ]},
      { title: "Conditioning finisher", open: false, items: [
        ["Jump rope / cycling intervals", "30 sec fast + 30 sec slow × 10", ""]
      ]}
    ]
  }
];

const extras = [
  { id: "nutrition", label: "Food", title: "Nutrition", focus: "Small calorie deficit", type: "nutrition" },
  { id: "progression", label: "Load", title: "Load Progression", focus: "Slow and safe", type: "progression" }
];

let current = localStorage.getItem("currentTab") || "day1";

function isDone(dayId) {
  return localStorage.getItem("done_" + dayId) === "1";
}

function setDone(dayId, value) {
  localStorage.setItem("done_" + dayId, value ? "1" : "0");
  renderTracker();
  renderScreen();
}

function allTabs() { return [...plan, ...extras]; }

function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = allTabs().map(t =>
    `<button class="tab ${t.id === current ? "active" : ""}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join("");
}

function renderTracker() {
  const tracker = document.getElementById("tracker");
  tracker.innerHTML = plan.map((d, i) => `
    <button class="track-day ${isDone(d.id) ? "done" : ""}" onclick="switchTab('${d.id}')">
      <strong>${isDone(d.id) ? "✓" : i + 1}</strong>
      <span>${d.label}</span>
    </button>
  `).join("");

  const doneCount = plan.filter(d => isDone(d.id)).length;
  document.getElementById("progressText").textContent = `${doneCount} of 5 workouts complete`;
  document.getElementById("streakPill").textContent = doneCount === 5 ? "Week done" : doneCount >= 3 ? "Good pace" : "Start light";
}

function renderWorkout(day) {
  return `
    <article class="card screen active">
      <div class="section-title">
        <div>
          <h2>${day.title}</h2>
          <div class="focus">${day.focus}</div>
        </div>
        <span class="pill">${day.label}</span>
      </div>

      <div class="quick">
        <div><strong>${day.time[0]}</strong><span>warm-up</span></div>
        <div><strong>${day.time[1]}</strong><span>training</span></div>
        <div><strong>${day.time[2]}</strong><span>finisher</span></div>
      </div>

      ${day.groups.map(g => `
        <details ${g.open ? "open" : ""}>
          <summary>${g.title}</summary>
          <div class="items">
            ${g.items.map((it, idx) => {
              const key = `${day.id}_${g.title}_${idx}`.replace(/\W/g, "_");
              const done = localStorage.getItem("item_" + key) === "1";
              return `
                <div class="item ${done ? "completed" : ""}">
                  <input class="check" type="checkbox" ${done ? "checked" : ""} onchange="toggleItem('${key}', this)">
                  <div class="item-text">
                    <label>${it[0]}</label>
                    <small>${it[1]}</small>
                  </div>
                  ${it[2] ? `<a class="watch" href="${it[2]}" target="_blank" rel="noopener">Demo</a>` : ""}
                </div>
              `;
            }).join("")}
          </div>
        </details>
      `).join("")}

      <button class="done-btn ${isDone(day.id) ? "done" : ""}" onclick="setDone('${day.id}', ${!isDone(day.id)})">
        ${isDone(day.id) ? "Workout marked complete" : "Mark workout complete"}
      </button>

      <p class="note">Beginner rule: stop each set with 2–3 reps still left in the tank.</p>
    </article>
  `;
}

function renderNutrition() {
  return `
    <article class="card screen active">
      <div class="section-title">
        <div>
          <h2>Nutrition</h2>
          <div class="focus">Small calorie deficit. Don’t crash diet.</div>
        </div>
        <span class="pill">Food</span>
      </div>

      <div class="quick">
        <div><strong>110–130g</strong><span>protein/day</span></div>
        <div><strong>300–400</strong><span>kcal deficit</span></div>
        <div><strong>1–2 tbsp</strong><span>oil/day max</span></div>
      </div>

      <div class="two-col">
        <div class="meal"><strong>Protein</strong><span>Chicken, eggs, paneer, tofu, Greek yogurt, dal + rice.</span></div>
        <div class="meal"><strong>Carbs</strong><span>Rice, roti, oats, fruits. Keep them controlled, not zero.</span></div>
        <div class="meal"><strong>Fats</strong><span>Nuts, seeds, and limited cooking oil.</span></div>
        <div class="meal"><strong>Dinner</strong><span>Protein-heavy + vegetables. Slightly lower carbs if needed.</span></div>
      </div>

      <details open>
        <summary>Simple day template</summary>
        <div class="meal-grid" style="padding: 0 12px 12px;">
          <div class="meal"><strong>Breakfast</strong><span>Eggs + toast OR oats + yogurt + fruit.</span></div>
          <div class="meal"><strong>Lunch</strong><span>150–200g chicken/paneer + rice/2 rotis + vegetables.</span></div>
          <div class="meal"><strong>Snack</strong><span>Fruit + nuts OR protein shake.</span></div>
          <div class="meal"><strong>Dinner</strong><span>Protein + vegetables. Keep it simple.</span></div>
        </div>
      </details>
    </article>
  `;
}

function renderProgression() {
  return `
    <article class="card screen active">
      <div class="section-title">
        <div>
          <h2>Load Progression</h2>
          <div class="focus">How to get stronger without rushing.</div>
        </div>
        <span class="pill">Beginner</span>
      </div>

      <div class="meal-grid">
        <div class="meal"><strong>1. Week 1–2</strong><span>Use bodyweight or very light weights. Learn balance and full range.</span></div>
        <div class="meal"><strong>2. Week 2–4</strong><span>Pick a weight where 10–12 reps are comfortable, with the last 2 slightly hard.</span></div>
        <div class="meal"><strong>3. Use 8–12 reps</strong><span>If 12 reps feel easy, increase next time. If below 8 is hard, reduce.</span></div>
        <div class="meal"><strong>4. Small jumps</strong><span>Upper body: +2.5 kg. Lower body: +5 kg. Smaller is also fine.</span></div>
        <div class="meal"><strong>5. Track one thing</strong><span>Either reps or weight. One of them should slowly improve.</span></div>
      </div>

      <p class="note">Form beats load. If the movement gets messy, the weight is too heavy.</p>
    </article>
  `;
}

function renderScreen() {
  const screen = document.getElementById("screen");
  const day = plan.find(d => d.id === current);
  if (day) screen.innerHTML = renderWorkout(day);
  else if (current === "nutrition") screen.innerHTML = renderNutrition();
  else screen.innerHTML = renderProgression();
  renderTabs();
}

function switchTab(id) {
  current = id;
  localStorage.setItem("currentTab", id);
  renderScreen();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function toggleItem(key, el) {
  localStorage.setItem("item_" + key, el.checked ? "1" : "0");
  el.closest(".item").classList.toggle("completed", el.checked);
}

function resetWeek() {
  plan.forEach(d => localStorage.removeItem("done_" + d.id));
  Object.keys(localStorage).forEach(k => {
    if (k.startsWith("item_")) localStorage.removeItem(k);
  });
  renderTracker();
  renderScreen();
}

function goPrev() {
  const tabs = allTabs();
  const idx = tabs.findIndex(t => t.id === current);
  switchTab(tabs[(idx - 1 + tabs.length) % tabs.length].id);
}

function goNext() {
  const tabs = allTabs();
  const idx = tabs.findIndex(t => t.id === current);
  switchTab(tabs[(idx + 1) % tabs.length].id);
}

renderTabs();
renderTracker();
renderScreen();
</script>
